  <text x="305" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#10b981">✓ PASSED</text>
  <text x="305" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#10b981" opacity="0.7">100% Quality</text>

  <!-- Decorative dots -->
  <circle cx="30" cy="240" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="45" cy="235" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="370" cy="30" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="355" cy="40" r="2" fill="#fbbf24" opacity="0.3"/>

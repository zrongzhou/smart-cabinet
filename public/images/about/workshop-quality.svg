  <text x="146" y="93" font-family="Arial,sans-serif" font-size="9" fill="#374151">Visual Inspection</text>
  
  <rect x="108" y="108" width="104" height="22" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <polyline points="116,119 122,125 136,112" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="146" y="123" font-family="Arial,sans-serif" font-size="9" fill="#374151">Dimension Check</text>

  <rect x="138" y="138" width="74" height="22" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <polyline points="146,149 152,155 166,142" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="174" y="153" font-family="Arial,sans-serif" font-size="9" fill="#374151">RFID Test</text>

  <rect x="108" y="168" width="104" height="22" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <polyline points="116,179 122,185 136,172" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="146" y="183" font-family="Arial,sans-serif" font-size="9" fill="#374151">Load Testing</text>
  
  <rect x="108" y="198" width="104" height="22" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <polyline points="116,209 122,215 136,202" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="146" y="213" font-family="Arial,sans-serif" font-size="9" fill="#374151">Final QC Sign-off</text>

  <!-- Magnifying glass -->
  <circle cx="295" cy="145" r="42" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.8"/>
  <circle cx="295" cy="145" r="32" fill="#fef3c7" opacity="0.25"/>
  <line x1="326" y1="176" x2="350" y2="200" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Magnifying checkmark -->
  <polyline points="278,145 290,158 312,132" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stamp -->

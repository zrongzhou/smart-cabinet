<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="qbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0f2744"/></linearGradient>
    <linearGradient id="qcgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
  </defs>
  <rect width="400" height="260" rx="12" fill="url(#qbg)"/>
  <!-- Grid pattern -->
  <path d="M0 60h400M0 120h400M0 180h400M80 0v260M160 0v260M240 0v260M320 0v260" stroke="#2d4a6f" stroke-width="0.5" opacity="0.4"/>
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#10b981" letter-spacing="3">QUALITY CONTROL</text>
  <!-- Clipboard / Checklist -->
  <rect x="90" y="55" width="140" height="180" rx="8" fill="#e8f4f0" stroke="#10b981" stroke-width="2"/>
  <rect x="105" y="45" width="110" height="20" rx="4" fill="url(#qcgrad)"/>
  <circle cx="115" cy="55" r="5" fill="white" opacity="0.7"/>
  <line x1="130" y1="52" x2="200" y2="52" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="130" y1="58" x2="180" y2="58" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Check items -->
  <rect x="108" y="78" width="104" height="22" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#450a0a"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="640" height="480" fill="url(#bg5)"/>
  <!-- Welding table -->
  <rect x="80" y="320" width="480" height="16" rx="3" fill="#1c1917" stroke="#78716c" stroke-width="1.5"/>
  <!-- Workpiece -->
  <rect x="200" y="260" width="240" height="60" rx="4" fill="#78716c" stroke="#a8a29e" stroke-width="1.5"/>
  <rect x="200" y="260" width="240" height="8" rx="2" fill="#a8a29e" opacity="0.5"/>
  <!-- Welding torch -->
  <g transform="translate(320,100)">
    <!-- Cable -->
    <path d="M 0 0 Q 40 30 20 80 Q 0 120 10 160 L 10 200" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.7"/>
    <!-- Torch body -->
    <rect x="-6" y="160" width="12" height="60" rx="3" fill="#374151"/>
    <rect x="-4" y="210" width="8" height="30" rx="2" fill="#4b5563"/>
    <!-- Nozzle -->
    <circle cx="0" cy="245" r="6" fill="#6b7280"/>
  </g>
  <!-- Welding arc -->
  <ellipse cx="320" cy="260" rx="18" ry="10" fill="#fef08a" opacity="0.9" filter="url(#glow5)"/>
  <ellipse cx="320" cy="260" rx="30" ry="16" fill="#fbbf24" opacity="0.5" filter="url(#glow5)"/>
  <ellipse cx="320" cy="260" rx="50" ry="25" fill="#f97316" opacity="0.2" filter="url(#glow5)"/>
  <!-- Welding mask (top left) -->
  <rect x="100" y="120" width="80" height="100" rx="8" fill="#1c1917" stroke="#fbbf24" stroke-width="2"/>
  <rect x="115" y="140" width="50" height="30" rx="4" fill="#60a5fa" opacity="0.7"/>
  <text x="140" y="190" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="Arial,sans-serif">AUTO-DARK</text>
  <!-- Sparks -->
  <circle cx="310" cy="250" r="2" fill="#fef08a" opacity="0.9"/>
  <circle cx="330" cy="255" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="315" cy="270" r="1" fill="#fef08a" opacity="0.7"/>
  <circle cx="325" cy="248" r="2.5" fill="#f97316" opacity="0.6"/>
  <circle cx="335" cy="262" r="1.2" fill="#fef08a" opacity="0.8"/>
  <circle cx="308" cy="258" r="1.8" fill="#fbbf24" opacity="0.7"/>
  <!-- Smoke/fumes -->
  <ellipse cx="340" cy="220" rx="25" ry="8" fill="#78716c" opacity="0.3"/>
  <ellipse cx="350" cy="200" rx="20" ry="6" fill="#78716c" opacity="0.2"/>
  <ellipse cx="345" cy="185" rx="15" ry="5" fill="#78716c" opacity="0.15"/>
  <!-- Welding parameters display -->
  <rect x="420" y="100" width="180" height="80" rx="6" fill="#0c0a09" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="430" y="125" fill="#fbbf24" font-size="11" font-weight="bold" font-family="monospace">WELDING PARAMS</text>
  <text x="430" y="150" fill="#fef08a" font-size="11" font-family="monospace">Current: 180A</text>
  <text x="430" y="170" fill="#fef08a" font-size="11" font-family="monospace">Voltage: 24V</text>
  <!-- Title -->
  <text x="320" y="50" text-anchor="middle" fill="#fbbf24" font-size="28" font-weight="bold" font-family="Arial,sans-serif">WELDING</text>
  <text x="320" y="460" text-anchor="middle" fill="#fca5a5" font-size="16" font-family="Arial,sans-serif">Argon Arc Welding · Seam Welding · Strength Test</text>
</svg>

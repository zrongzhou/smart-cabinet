<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#44403c"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="640" height="480" fill="url(#bg2)"/>
  <!-- Machine body -->
  <rect x="100" y="200" width="440" height="180" rx="8" fill="#292524" stroke="#78716c" stroke-width="2"/>
  <rect x="100" y="200" width="440" height="30" rx="8" fill="#44403c"/>
  <!-- Laser beam -->
  <line x1="320" y1="80" x2="320" y2="200" stroke="#fbbf24" stroke-width="3" filter="url(#glow1)" opacity="0.9"/>
  <line x1="320" y1="80" x2="320" y2="200" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>
  <!-- Cutting head -->
  <circle cx="320" cy="80" r="20" fill="#78716c" stroke="#a8a29e" stroke-width="2"/>
  <circle cx="320" cy="80" r="8" fill="#fbbf24" opacity="0.8"/>
  <!-- Sparks -->
  <circle cx="300" cy="190" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="335" cy="185" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="310" cy="195" r="1" fill="#fef3c7" opacity="0.9"/>
  <circle cx="330" cy="188" r="2.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="305" cy="192" r="1.8" fill="#f97316" opacity="0.7"/>
  <!-- Metal sheet -->
  <rect x="140" y="210" width="360" height="8" rx="2" fill="#a8a29e"/>
  <rect x="140" y="210" width="360" height="4" rx="2" fill="#d6d3d1" opacity="0.5"/>
  <!-- Cut line -->
  <line x1="320" y1="210" x2="320" y2="218" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Control panel -->
  <rect x="200" y="230" width="240" height="60" rx="4" fill="#1c1917" stroke="#78716c" stroke-width="1"/>
  <circle cx="230" cy="255" r="6" fill="#22c55e"/>
  <circle cx="260" cy="255" r="6" fill="#ef4444"/>
  <rect x="300" y="248" width="120" height="14" rx="3" fill="#0c4a6e"/>
  <text x="360" y="259" text-anchor="middle" fill="#7dd3fc" font-size="9" font-family="monospace">CUT-001</text>
  <!-- Title -->
  <text x="320" y="50" text-anchor="middle" fill="#fbbf24" font-size="28" font-weight="bold" font-family="Arial,sans-serif">CUTTING</text>
  <text x="320" y="460" text-anchor="middle" fill="#a8a29e" font-size="16" font-family="Arial,sans-serif">Laser Cutting · CNC Machining · Precision Processing</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0c2d48"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="960" height="540" fill="url(#bg7)"/>
  <!-- Factory building -->
  <rect x="200" y="200" width="560" height="240" rx="4" fill="#1a365d" stroke="#4299e1" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="180,200 760,200 760,200 480,150 200,200" fill="#2563eb" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="240" y="240" width="60" height="50" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <rect x="340" y="240" width="60" height="50" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <rect x="440" y="240" width="60" height="50" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <rect x="540" y="240" width="60" height="50" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <rect x="640" y="240" width="60" height="50" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <!-- Factory floor -->
  <rect x="180" y="440" width="600" height="10" rx="2" fill="#1e3a5f"/>
  <!-- Gate -->
  <rect x="420" y="320" width="120" height="120" rx="4" fill="#1a365d" stroke="#4299e1" stroke-width="2"/>
  <circle cx="520" cy="380" r="6" fill="#fbbf24" opacity="0.8"/>
  <!-- Company name -->
  <text x="480" y="130" text-anchor="middle" fill="#60a5fa" font-size="36" font-weight="bold" font-family="Arial,sans-serif">GUANGZHOU QIUYAN</text>
  <text x="480" y="170" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial,sans-serif">TECHNOLOGY CO., LTD.</text>
  <!-- Decorative circuit lines (representing smart cabinet technology) -->
  <path d="M 100 480 L 180 480" stroke="#4299e1" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 780 480 L 860 480" stroke="#4299e1" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="100" cy="480" r="4" fill="#4299e1" opacity="0.7"/>
  <circle cx="860" cy="480" r="4" fill="#4299e1" opacity="0.7"/>
  <!-- Bottom gradient overlay for text -->
  <rect x="0" y="440" width="960" height="100" fill="url(#bg7)" opacity="0.8"/>
</svg>

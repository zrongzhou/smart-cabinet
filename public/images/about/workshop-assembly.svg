<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#172554"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="480" fill="url(#bg4)"/>
  <!-- Workbench -->
  <rect x="60" y="300" width="520" height="20" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Cabinet body (partially assembled) -->
  <rect x="180" y="180" width="280" height="120" rx="6" fill="#1e40af" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <rect x="180" y="180" width="280" height="20" rx="6" fill="#3b82f6" opacity="0.6"/>
  <!-- Drawer being inserted -->
  <rect x="220" y="220" width="200" height="60" rx="4" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="10,5" opacity="0.9"/>
  <polygon points="420,250 450,240 450,260" fill="#fbbf24" opacity="0.8"/>
  <!-- Screws -->
  <circle cx="200" cy="250" r="4" fill="#9ca3af"/>
  <circle cx="200" cy="250" r="2" fill="#d1d5db"/>
  <circle cx="440" cy="250" r="4" fill="#9ca3af"/>
  <circle cx="440" cy="250" r="2" fill="#d1d5db"/>
  <!-- Tools -->
  <g transform="translate(100,200) rotate(-30)">
    <rect x="0" y="0" width="8" height="60" rx="2" fill="#78716c"/>
    <rect x="0" y="0" width="8" height="12" rx="2" fill="#a8a29e"/>
  </g>
  <g transform="translate(500,190) rotate(20)">
    <rect x="0" y="0" width="6" height="70" rx="2" fill="#d97706"/>
    <circle cx="3" cy="8" r="5" fill="#fbbf24"/>
  </g>
  <!-- Checklist -->
  <rect x="420" y="110" width="160" height="130" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="430" y="135" fill="#22c55e" font-size="12" font-weight="bold" font-family="monospace">ASSEMBLY CHECKLIST</text>
  <line x1="425" y1="142" x2="575" y2="142" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <text x="435" y="162" fill="#4ade80" font-size="11" font-family="monospace">✓ Frame welding</text>
  <text x="435" y="182" fill="#4ade80" font-size="11" font-family="monospace">✓ Door alignment</text>
  <text x="435" y="202" fill="#4ade80" font-size="11" font-family="monospace">✓ Drawer slides</text>
  <text x="435" y="222" fill="#fbbf24" font-size="11" font-family="monospace">◐ Handle install</text>
  <text x="435" y="242" fill="#fbbf24" font-size="11" font-family="monospace">◐ Final QC</text>
  <!-- Progress bar -->
  <rect x="80" y="430" width="480" height="16" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <rect x="82" y="432" width="340" height="12" rx="6" fill="#22c55e" opacity="0.8"/>
  <text x="320" y="443" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial,sans-serif">72%</text>
  <!-- Title -->
  <text x="320" y="50" text-anchor="middle" fill="#60a5fa" font-size="28" font-weight="bold" font-family="Arial,sans-serif">ASSEMBLY</text>
  <text x="320" y="460" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial,sans-serif">Precision Assembly · Workstation · Quality Control</text>
</svg>

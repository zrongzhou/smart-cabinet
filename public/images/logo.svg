<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <!-- Brand-blue gradient for the outer ring -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Bright blue gradient for the front star -->
    <linearGradient id="starGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Subtle drop shadow for a soft, professional lift -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1e40af" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer ring: brand-blue stroke with faint fill (position preserved: cx=28 cy=28 r=24) -->
  <circle cx="28" cy="28" r="24" fill="url(#logoGrad)" opacity="0.10" stroke="url(#logoGrad)" stroke-width="1.6"/>

  <!-- Dual four-pointed star mark (replaces the old S-swirl): back slate star + front blue star, offset rotation for layered depth -->
  <g filter="url(#softShadow)">
    <!-- Back star: cool slate, rotated +18° -->
    <path d="M28 12 L31 25 L44 28 L31 31 L28 44 L25 31 L12 28 L25 25 Z"
          fill="#64748B" opacity="0.85" transform="rotate(18 28 28)"/>

    <!-- Front star: bright blue gradient, rotated -12° -->
    <path d="M28 10 L32 24 L46 28 L32 32 L28 46 L24 32 L10 28 L24 24 Z"
          fill="url(#starGrad)" transform="rotate(-12 28 28)"/>
  </g>

  <!-- Company name: Qtech -->
  <text x="60" y="26" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="20" font-weight="700" fill="#334155" letter-spacing="-0.3">
    Qtech
  </text>

  <!-- Subtitle: Tool Cabinet -->
  <text x="60" y="44" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.8">
    TOOL CABINET
  </text>

  <!-- Small dot separator accent -->
  <circle cx="59" cy="34" r="1.5" fill="#3b82f6" opacity="0.5"/>
</svg>

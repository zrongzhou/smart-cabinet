<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <!-- Logo gradient - blue-indigo tech feel -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Star inner gradient -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="28" cy="28" r="24" fill="url(#logoGrad)" opacity="0.12" stroke="url(#logoGrad)" stroke-width="1.5"/>

  <!-- Four-pointed star (Qtech-style kite shape) -->
  <g filter="url(#softShadow)">
    <!-- Main star body - four points -->
    <path d="M28 8
             C30 16, 35 20, 40 22
             C35 24, 30 28, 28 38
             C26 28, 21 24, 16 22
             C21 20, 26 16, 28 8Z"
          fill="url(#starGrad)"/>

    <!-- Star highlight - lighter top-left facet -->
    <path d="M28 8
             C29 14, 32 18, 36 20
             L28 22
             L20 20
             C24 18, 27 14, 28 8Z"
          fill="rgba(147,197,253,0.5)"/>

    <!-- Inner diamond accent -->
    <path d="M28 17
             C29.5 20, 31.5 21.5, 34 22
             C31.5 22.5, 29.5 24, 28 28
             C26.5 24, 24.5 22.5, 22 22
             C24.5 21.5, 26.5 20, 28 17Z"
          fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Company name: Qtech / 秋渊科技 -->
  <text x="60" y="26" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="20" font-weight="700" fill="#334155" letter-spacing="-0.3">
    Qtech
  </text>

  <!-- Subtitle: Tool Cabinet -->
  <text x="60" y="44" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.8">
    TOOL CABINET
  </text>

  <!-- Small dot separator accent -->
  <circle cx="59" cy="34" r="1.5" fill="#3b82f6" opacity="0.5"/>
</svg>

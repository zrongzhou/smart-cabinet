<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <!-- 深蓝水晶渐变 -->
    <linearGradient id="cr" x1="4" y1="2" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a1a4f"/>
      <stop offset="0.35" stop-color="#1e40af"/>
      <stop offset="0.7" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- 双星亮白渐变 -->
    <linearGradient id="st" x1="10" y1="8" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- 深蓝水晶菱形 -->
  <polygon points="24,3 45,24 24,45 3,24" fill="url(#cr)" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.7"/>

  <!-- 水晶切面高光 -->
  <path d="M24 3 L24 45" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.6"/>
  <path d="M3 24 L45 24" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.6"/>
  <path d="M24 3 L33 12 L15 12 Z" fill="#ffffff" fill-opacity="0.22"/>

  <!-- 主星 -->
  <path d="M19 13 L21.8 23.6 L31 26.4 L21.8 29.2 L19 39.5 L16.2 29.2 L6.5 26.4 L16.2 23.6 Z" fill="url(#st)"/>
  <!-- 次星 -->
  <path d="M33 8 L34 12 L38 13 L34 14 L33 18 L32 14 L28 13 L32 12 Z" fill="url(#st)" opacity="0.75"/>

  <!-- Qtech -->
  <text x="54" y="25" font-family="'Inter',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Qtech</text>
  <!-- Tool Cabinet -->
  <text x="54" y="40" font-family="'Inter',-apple-system,sans-serif" font-size="9" font-weight="400" fill="#2563eb" letter-spacing="0.8">TOOL CABINET</text>
</svg>

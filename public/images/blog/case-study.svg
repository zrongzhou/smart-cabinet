<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg-blog2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2d10"/><stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg-blog2)"/>
  <!-- Clipboard background -->
  <rect x="180" y="60" width="280" height="240" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <rect x="180" y="60" width="280" height="36" rx="8" fill="#166534"/>
  <!-- Lines representing text on clipboard -->
  <line x1="220" y1="130" x2="420" y2="130" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="155" x2="400" y2="155" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <line x1="220" y1="180" x2="410" y2="180" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="205" x2="380" y2="205" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <line x1="220" y1="230" x2="415" y2="230" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <!-- Checkmarks -->
  <polyline points="200,130 210,140 230,120" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <polyline points="200,180 210,190 230,170" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <polyline points="200,230 210,240 230,220" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <!-- Pencil -->
  <g transform="translate(460,90) rotate(25)">
    <rect x="0" y="0" width="12" height="70" rx="3" fill="#f97316"/><polygon points="0,70 12,70 6,90" fill="#1c1917"/>
    <rect x="0" y="0" width="12" height="10" rx="3" fill="#fb923c"/>
  </g>
  <!-- Title -->
  <text x="320" y="50" text-anchor="middle" fill="#4ade80" font-size="24" font-weight="bold" font-family="Arial,sans-serif">CASE STUDY</text>
  <text x="320" y="340" text-anchor="middle" fill="#86efac" font-size="14" font-family="Arial,sans-serif">Real Results · Customer Success · ROI Analysis</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg-blog1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg-blog1)"/>
  <!-- Circuit-like lines representing industry trends -->
  <line x1="60" y1="180" x2="580" y2="180" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>
  <line x1="320" y1="40" x2="320" y2="320" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>
  <circle cx="320" cy="180" r="80" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <circle cx="320" cy="180" r="120" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <!-- Trending arrow -->
  <polyline points="120,280 200,220 280,250 360,160 440,190 520,120" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.8"/>
  <polygon points="520,120 540,110 530,140" fill="#22c55e" opacity="0.8"/>
  <!-- Data nodes -->
  <circle cx="120" cy="280" r="5" fill="#22c55e" opacity="0.7"/><circle cx="200" cy="220" r="5" fill="#22c55e" opacity="0.7"/>
  <circle cx="280" cy="250" r="5" fill="#22c55e" opacity="0.7"/><circle cx="360" cy="160" r="5" fill="#22c55e" opacity="0.7"/>
  <circle cx="440" cy="190" r="5" fill="#22c55e" opacity="0.7"/><circle cx="520" cy="120" r="5" fill="#22c55e" opacity="0.7"/>
  <!-- Title -->
  <text x="320" y="50" text-anchor="middle" fill="#60a5fa" font-size="24" font-weight="bold" font-family="Arial,sans-serif">INDUSTRY TRENDS</text>
  <text x="320" y="320" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial,sans-serif">Market Analysis · Future Outlook · Data Insights</text>
</svg>

# HTTP - redirect to HTTPS (both test. and www.)
server {
    listen 80;
    server_name test.wstoolcabinet.com www.test.wstoolcabinet.com wstoolcabinet.com www.wstoolcabinet.com;
    return 301 https://$host$request_uri;
}

# HTTPS for test.wstoolcabinet.com (existing)
server {
    listen 443 ssl;
    keepalive_timeout 65;
    server_name test.wstoolcabinet.com www.test.wstoolcabinet.com;

    ssl_certificate /etc/nginx/ssl/test.wstoolcabinet.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/test.wstoolcabinet.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_stapling off;
    ssl_stapling_verify off;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression (ENABLED for performance)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/font-woff
        application/font-woff2;

    location / {
        client_max_body_size 50m;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets — long cache
    location /_next/static {
        alias /var/www/smart-cabinet/.next/static;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Static files (images, fonts, etc.)
    location ~* \.(svg|png|jpg|jpeg|gif|webp|avif|ico|woff|woff2|ttf|eot)$ {
        root /var/www/smart-cabinet/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # API media files — cache 7 days
    location /api/media/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=604800";
    }
}


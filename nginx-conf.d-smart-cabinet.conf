# ===========================================================================
# smart-cabinet Nginx site configuration (TEMPLATE)
# ---------------------------------------------------------------------------
# Managed by the admin "Services" console (V8 / T5, Q2). Do NOT hard-code a
# domain/port here — this file is a template. The service manager replaces:
#   __DOMAIN__  -> site domain (e.g. www.wstoolcabinet.com)
#   __PORT__    -> app listen port (e.g. 3000, the smart-cabinet / pm2 process)
# then writes the result to the active conf path and reloads nginx.
#
# NOTE: SSL certificate paths embed the domain. They must match the filenames
# certbot actually issued for that domain.
# ===========================================================================

# HTTP -> HTTPS redirect
# The `return 301` line is the toggle marker for the admin "Force HTTPS" switch
# (see src/lib/services/httpsRedirect.ts). When the switch is OFF the `return
# 301` is removed and the `location /` proxy block below serves the app
# directly over plain HTTP — so HTTP access never 404s. With `return 301`
# present (the default) nginx short-circuits to HTTPS and the `location /`
# below is effectively dormant but kept so disabling the redirect "just works".
server {
    listen 80;
    server_name __DOMAIN__;
    return 301 https://$host$request_uri;
    location / {
        client_max_body_size 50m;
        proxy_pass http://localhost:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTPS main site
server {
    listen 443 ssl;
    keepalive_timeout 65;
    server_name __DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/__DOMAIN___bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/__DOMAIN__.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_stapling off;
    ssl_stapling_verify off;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression (ENABLED for performance)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/font-woff
        application/font-woff2;

    location / {
        client_max_body_size 50m;
        proxy_pass http://localhost:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets — long cache
    location /_next/static {
        alias /var/www/smart-cabinet/.next/static;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Static files (images, fonts, etc.)
    location ~* \.(svg|png|jpg|jpeg|gif|webp|avif|ico|woff|woff2|ttf|eot)$ {
        root /var/www/smart-cabinet/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # API media files — cache 7 days
    location /api/media/ {
        proxy_pass http://localhost:__PORT__;
        proxy_set_header Host $host;
        expires 7d;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=604800";
    }
}
